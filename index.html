<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(180deg,#020617,#0f172a);
    color:white;
}

.header{
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.tabs{
    display:flex;
    justify-content:space-around;
    margin:10px;
    background:#111827;
    border-radius:15px;
    padding:5px;
}

.tab{
    flex:1;
    text-align:center;
    padding:8px;
    border-radius:10px;
    cursor:pointer;
}

.active{
    background:linear-gradient(90deg,#7c3aed,#ec4899);
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
}

.card{
    background:#111827;
    border-radius:15px;
    padding:12px;
    text-align:center;
    position:relative;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.discount{
    position:absolute;
    top:10px;
    right:10px;
    background:#f97316;
    padding:4px 8px;
    border-radius:10px;
    font-size:12px;
}

.price{
    color:#facc15;
    font-size:18px;
}

.old{
    text-decoration:line-through;
    color:#64748b;
    font-size:12px;
}

button{
    background:linear-gradient(90deg,#2563eb,#4f46e5);
    border:none;
    padding:8px;
    border-radius:10px;
    color:white;
    width:100%;
    margin-top:8px;
}

.hidden{ display:none; }

</style>
</head>

<body>

<div class="header">🎁 Musu Gift Store</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('regular', this)">🎁 Regular</div>
    <div class="tab" onclick="showTab('hidden', this)">🕵️ Hidden</div>
    <div class="tab" onclick="showTab('sell', this)">⭐ Sell</div>
</div>

<!-- REGULAR -->
<div id="regular" class="container">

<div class="card">
<div class="discount">-13%</div>
<h3>💝</h3>
<p>Heart</p>
<div class="price">13 ⭐</div>
<div class="old">15 ⭐</div>
<button onclick="buy('heart',13)">Tap to Buy</button>
</div>

<div class="card">
<div class="discount">-13%</div>
<h3>🧸</h3>
<p>Teddy</p>
<div class="price">13 ⭐</div>
<div class="old">15 ⭐</div>
<button onclick="buy('teddy',13)">Tap to Buy</button>
</div>

</div>

<!-- HIDDEN -->
<div id="hidden" class="container hidden">

<div class="card">
<div class="discount">-10%</div>
<h3>🧸</h3>
<p>New Year Teddy</p>
<div class="price">45 ⭐</div>
<div class="old">50 ⭐</div>
<button onclick="buy('nyteddy',45)">Tap to Buy</button>
</div>

<div class="card">
<div class="discount">-10%</div>
<h3>🎄</h3>
<p>Christmas Tree</p>
<div class="price">45 ⭐</div>
<div class="old">50 ⭐</div>
<button onclick="buy('tree',45)">Tap to Buy</button>
</div>

<div class="card">
<div class="discount">-10%</div>
<h3>🎁</h3>
<p>Festive Gift Box</p>
<div class="price">45 ⭐</div>
<div class="old">50 ⭐</div>
<button onclick="buy('festbox',45)">Tap to Buy</button>
</div>

</div>

<!-- SELL -->
<div id="sell" class="container hidden">
<div class="card">
<p>⭐ Sell your Stars (Coming Soon)</p>
</div>
</div>

<script>
let tg = window.Telegram.WebApp;

function buy(gift, price){
    tg.sendData(JSON.stringify({
        gift: gift,
        price: price
    }));
}

function showTab(tabId, el){
    document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
    document.getElementById(tabId).classList.remove('hidden');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}
</script>

</body>
</html>
