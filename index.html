<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(180deg,#020617,#0f172a);
    color:white;
}

.header{
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.tabs{
    display:flex;
    justify-content:center;
    margin:10px;
    background:#111827;
    border-radius:15px;
    padding:5px;
}

.tab{
    padding:8px 20px;
    border-radius:10px;
    background:linear-gradient(90deg,#7c3aed,#ec4899);
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
}

.card{
    background:#111827;
    border-radius:15px;
    padding:12px;
    text-align:center;
    position:relative;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.discount{
    position:absolute;
    top:10px;
    right:10px;
    background:#f97316;
    padding:4px 8px;
    border-radius:10px;
    font-size:12px;
}

.price{
    color:#facc15;
    font-size:18px;
}

.old{
    text-decoration:line-through;
    color:#64748b;
    font-size:12px;
}

button{
    background:linear-gradient(90deg,#2563eb,#4f46e5);
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    width:100%;
    margin-top:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🎁 Musu Gift Store</div>

<div class="tabs">
    <div class="tab">🔥 All Gifts (Best Price)</div>
</div>

<div class="container">

<!-- 13⭐ -->
<div class="card"><div class="discount">-13%</div><h3>💝</h3><p>Heart</p><div class="price">13 ⭐</div><div class="old">15 ⭐</div><button onclick="buy('heart',13,'Heart')">Tap to Buy</button></div>

<div class="card"><div class="discount">-13%</div><h3>🧸</h3><p>Teddy</p><div class="price">13 ⭐</div><div class="old">15 ⭐</div><button onclick="buy('teddy',13,'Teddy')">Tap to Buy</button></div>

<!-- 22⭐ -->
<div class="card"><div class="discount">-12%</div><h3>🎁</h3><p>Gift Box</p><div class="price">22 ⭐</div><div class="old">25 ⭐</div><button onclick="buy('box',22,'Gift Box')">Tap to Buy</button></div>

<div class="card"><div class="discount">-12%</div><h3>🌹</h3><p>Rose</p><div class="price">22 ⭐</div><div class="old">25 ⭐</div><button onclick="buy('rose',22,'Rose')">Tap to Buy</button></div>

<!-- 45⭐ -->
<div class="card"><h3>🎂</h3><p>Cake</p><div class="price">45 ⭐</div><button onclick="buy('cake',45,'Cake')">Tap to Buy</button></div>

<div class="card"><h3>💐</h3><p>Flowers</p><div class="price">45 ⭐</div><button onclick="buy('flowers',45,'Flowers')">Tap to Buy</button></div>

<div class="card"><h3>🚀</h3><p>Rocket</p><div class="price">45 ⭐</div><button onclick="buy('rocket',45,'Rocket')">Tap to Buy</button></div>

<div class="card"><h3>🍾</h3><p>Bottle</p><div class="price">45 ⭐</div><button onclick="buy('bottle',45,'Bottle')">Tap to Buy</button></div>

<!-- 92⭐ -->
<div class="card"><h3>💍</h3><p>Ring</p><div class="price">92 ⭐</div><button onclick="buy('ring',92,'Ring')">Tap to Buy</button></div>

</div>

<script>
let tg = window.Telegram.WebApp;

function buy(gift, price, name){
    // Send data to bot - bot will send Stars invoice
    tg.sendData(JSON.stringify({
        gift: gift,
        price: price,
        name: name
    }));
    
    // Optional: haptic feedback
    if (tg.HapticFeedback) {
        tg.HapticFeedback.notificationOccurred('success');
    }
}
</script>

</body>
</html>
