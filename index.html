<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(180deg,#0f172a,#020617);
    color:white;
}

.header{
    padding:15px;
    text-align:center;
}

.badge{
    background:#22c55e;
    padding:5px 10px;
    border-radius:10px;
    font-size:12px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
}

.card{
    background:#111827;
    border-radius:15px;
    padding:12px;
    text-align:center;
    position:relative;
}

.discount{
    position:absolute;
    top:10px;
    right:10px;
    background:#f97316;
    padding:4px 8px;
    border-radius:10px;
    font-size:12px;
}

.price{
    color:#facc15;
    font-size:18px;
    margin:5px 0;
}

.old{
    text-decoration:line-through;
    color:#64748b;
    font-size:12px;
}

button{
    background:#1d4ed8;
    border:none;
    padding:8px;
    border-radius:10px;
    color:white;
    width:100%;
    margin-top:8px;
}

</style>
</head>

<body>

<div class="header">
<h2>🎁 Musu Gift Store</h2>
<p class="badge">🔥 UP TO 10% OFF</p>
</div>

<div class="container">

<div class="card">
<div class="discount">-13%</div>
<h3>💝</h3>
<p>Heart</p>
<div class="price">13 ⭐</div>
<div class="old">15 ⭐</div>
<button onclick="buy('heart',13)">Tap to Buy</button>
</div>

<div class="card">
<div class="discount">-13%</div>
<h3>🧸</h3>
<p>Teddy</p>
<div class="price">13 ⭐</div>
<div class="old">15 ⭐</div>
<button onclick="buy('teddy',13)">Tap to Buy</button>
</div>

<div class="card">
<div class="discount">-12%</div>
<h3>🎁</h3>
<p>Gift Box</p>
<div class="price">22 ⭐</div>
<div class="old">25 ⭐</div>
<button onclick="buy('box',22)">Tap to Buy</button>
</div>

<div class="card">
<div class="discount">-12%</div>
<h3>🌹</h3>
<p>Rose</p>
<div class="price">22 ⭐</div>
<div class="old">25 ⭐</div>
<button onclick="buy('rose',22)">Tap to Buy</button>
</div>

<div class="card">
<h3>🎂</h3>
<p>Cake</p>
<div class="price">45 ⭐</div>
<button onclick="buy('cake',45)">Tap to Buy</button>
</div>

<div class="card">
<h3>💐</h3>
<p>Flowers</p>
<div class="price">45 ⭐</div>
<button onclick="buy('flowers',45)">Tap to Buy</button>
</div>

<div class="card">
<h3>🚀</h3>
<p>Rocket</p>
<div class="price">45 ⭐</div>
<button onclick="buy('rocket',45)">Tap to Buy</button>
</div>

<div class="card">
<h3>🍾</h3>
<p>Bottle</p>
<div class="price">45 ⭐</div>
<button onclick="buy('bottle',45)">Tap to Buy</button>
</div>

<div class="card">
<h3>💍</h3>
<p>Ring</p>
<div class="price">92 ⭐</div>
<button onclick="buy('ring',92)">Tap to Buy</button>
</div>

</div>

<script>
let tg = window.Telegram.WebApp;

function buy(gift, price){
    tg.sendData(JSON.stringify({
        gift: gift,
        price: price
    }));
}
</script>

</body>
</html>
